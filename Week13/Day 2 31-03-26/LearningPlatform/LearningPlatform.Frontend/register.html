<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnify – Register</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">🎓</div>
      <h1>Learnify</h1>
      <p>Start your learning journey</p>
    </div>

    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join thousands of learners today</p>

      <div id="alert-box" class="alert hidden"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="johndoe" />
          <span class="field-error" id="username-error"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" name="password" placeholder="Min. 6 characters" />
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">👁</button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="role">I want to join as</label>
          <select id="role" name="role">
            <option value="Student">🎒 Student – Learn from courses</option>
            <option value="Instructor">🧑‍🏫 Instructor – Teach and create courses</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="register-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-spinner hidden">⏳ Creating…</span>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (localStorage.getItem('jwt_token')) {
      window.location.href = 'courses.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;

      let valid = true;
      if (!username) {
        showFieldError('username-error', 'Username is required'); valid = false;
      } else if (username.length < 3) {
        showFieldError('username-error', 'Username must be at least 3 characters'); valid = false;
      }
      if (!email) {
        showFieldError('email-error', 'Email is required'); valid = false;
      } else if (!isValidEmail(email)) {
        showFieldError('email-error', 'Please enter a valid email address'); valid = false;
      }
      if (!password) {
        showFieldError('password-error', 'Password is required'); valid = false;
      } else if (password.length < 6) {
        showFieldError('password-error', 'Password must be at least 6 characters'); valid = false;
      }
      if (!valid) return;

      setLoading(true);
      try {
        await apiPost('/api/auth/register', { Username: username, Email: email, Password: password, Role: role });
        showAlert('Account created! Redirecting to login…', 'success');
        setTimeout(() => window.location.href = 'login.html', 1200);
      } catch (err) {
        showAlert(err.message || 'Registration failed. Please try again.', 'error');
      } finally {
        setLoading(false);
      }
    });

    function setLoading(loading) {
      const btn = document.getElementById('register-btn');
      btn.querySelector('.btn-text').classList.toggle('hidden', loading);
      btn.querySelector('.btn-spinner').classList.toggle('hidden', !loading);
      btn.disabled = loading;
    }
  </script>
</body>
</html>
